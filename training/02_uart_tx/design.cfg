#!/bin/bash
# ============================================================
# Design Configuration — UART TX with FIFO + ICG
# ============================================================

DESIGN_NAME="uart_tx"
PLATFORM="sky130hd"

RTL_FILELIST="../../designs/02_uart_tx/rtl.f"
TOP_MODULE="uart_tx"

TB_FILE="../../designs/02_uart_tx/tb/tb_uart_tx.cpp"
SIM_BUILD_DIR="build"

SDC_FILE="../../designs/02_uart_tx/constraints/constraint.sdc"
CLOCK_PORT="clk"
CLOCK_PERIOD="10.0"

CORE_UTILIZATION="20"
PLACE_DENSITY="0.35"

LIB_FILES="platforms/\${PLATFORM}/lib/sky130_fd_sc_hd__tt_025C_1v80.lib"

SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
source "$SCRIPT_DIR/../../env.sh" 2>/dev/null

RTL_FILELIST="$SCRIPT_DIR/$RTL_FILELIST"
TB_FILE="$SCRIPT_DIR/$TB_FILE"
SIM_BUILD_DIR="$SCRIPT_DIR/$SIM_BUILD_DIR"
SDC_FILE="$SCRIPT_DIR/$SDC_FILE"

RTL_FILES=$(grep -v '^\s*#' "$RTL_FILELIST" | grep -v '^\s*$' | sed "s|^|$SCRIPT_DIR/../../designs/02_uart_tx/|" | tr '\n' ' ')

ORFS_FLOW="$ORFS/flow"
LIBERTY=$(eval echo "$ORFS_FLOW/$LIB_FILES")

ORFS_SRC="$ORFS_FLOW/designs/src/$DESIGN_NAME"
ORFS_CFG="$ORFS_FLOW/designs/$PLATFORM/$DESIGN_NAME"
RESULTS="$ORFS_FLOW/results/$PLATFORM/$DESIGN_NAME/base"
REPORTS="$ORFS_FLOW/reports/$PLATFORM/$DESIGN_NAME/base"
LOGS="$ORFS_FLOW/logs/$PLATFORM/$DESIGN_NAME/base"
DESIGN_CONFIG="./designs/$PLATFORM/$DESIGN_NAME/config.mk"
MAKE_CMD="make DESIGN_CONFIG=$DESIGN_CONFIG"

echo "──────────────────────────────────────"
echo "  Design:    $DESIGN_NAME ($TOP_MODULE)"
echo "  Platform:  $PLATFORM"
echo "  RTL:       $RTL_FILELIST → $RTL_FILES"
echo "  TB:        $TB_FILE"
echo "  SDC:       $SDC_FILE (period=${CLOCK_PERIOD}ns)"
echo "  Liberty:   $LIBERTY"
echo "  Results:   $RESULTS"
echo "  Reports:   $REPORTS"
echo "──────────────────────────────────────"
