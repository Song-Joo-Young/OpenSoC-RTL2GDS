#!/bin/bash
# ============================================================
# Design Configuration — 이 파일만 수정하면 다른 디자인에 적용 가능
# ============================================================

# --- 디자인 기본 정보 ---
DESIGN_NAME="counter4"                     # top module 이름
PLATFORM="sky130hd"                        # PDK (sky130hd, gf180, asap7 등)

# --- RTL 소스 ---
RTL_FILELIST="rtl.f"                       # filelist (한 줄에 파일 하나, #으로 주석)
TOP_MODULE="counter4"                      # top module 이름

# --- 테스트벤치 ---
TB_FILE="tb/tb_counter4.cpp"               # Verilator C++ testbench
SIM_BUILD_DIR="build"                      # sim 빌드 디렉토리

# --- 타이밍 제약 ---
SDC_FILE="constraints/constraint.sdc"      # SDC 파일
CLOCK_PORT="clk"                           # 클럭 포트 이름
CLOCK_PERIOD="10.0"                        # 클럭 주기 (ns)

# --- PnR 설정 ---
CORE_UTILIZATION="40"                      # 코어 면적 대비 셀 비율 (%)
PLACE_DENSITY=""                           # 배치 밀도 (비워두면 ORFS 기본값)

# --- 라이브러리 ---
# ORFS flow 경로 기준 (synth + STA에서 사용)
LIB_FILES="platforms/\${PLATFORM}/lib/sky130_fd_sc_hd__tt_025C_1v80.lib"
#
# 멀티코너 STA 시 추가 lib (선택):
# LIB_FF="platforms/\${PLATFORM}/lib/sky130_fd_sc_hd__ff_n40C_1v95.lib"
# LIB_SS="platforms/\${PLATFORM}/lib/sky130_fd_sc_hd__ss_100C_1v60.lib"

# --- SRAM macro (있으면) ---
# ADDITIONAL_LEFS=""                       # macro LEF 경로
# ADDITIONAL_LIBS=""                       # macro Liberty 경로
# ADDITIONAL_GDS=""                        # macro GDS 경로
# MACRO_PLACE_HALO="10 10"
# MACRO_PLACE_CHANNEL="20 20"

# ============================================================
# 아래는 자동 계산 — 수정 불필요
# ============================================================
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
source "$SCRIPT_DIR/../../env.sh" 2>/dev/null

# filelist → 공백 구분 파일 목록 (주석/빈줄 제거)
RTL_FILES=$(grep -v '^\s*#' "$SCRIPT_DIR/$RTL_FILELIST" | grep -v '^\s*$' | tr '\n' ' ')

# Liberty 경로 (ORFS flow 기준 상대경로 → 절대경로)
ORFS_FLOW="$ORFS/flow"
LIBERTY=$(eval echo "$ORFS_FLOW/$LIB_FILES")

ORFS_SRC="$ORFS_FLOW/designs/src/$DESIGN_NAME"
ORFS_CFG="$ORFS_FLOW/designs/$PLATFORM/$DESIGN_NAME"
RESULTS="$ORFS_FLOW/results/$PLATFORM/$DESIGN_NAME/base"
REPORTS="$ORFS_FLOW/reports/$PLATFORM/$DESIGN_NAME/base"
LOGS="$ORFS_FLOW/logs/$PLATFORM/$DESIGN_NAME/base"
MAKE_CMD="make -C $ORFS_FLOW DESIGN_CONFIG=./designs/$PLATFORM/$DESIGN_NAME/config.mk"

echo "──────────────────────────────────────"
echo "  Design:    $DESIGN_NAME ($TOP_MODULE)"
echo "  Platform:  $PLATFORM"
echo "  RTL:       $RTL_FILELIST → $RTL_FILES"
echo "  TB:        $TB_FILE"
echo "  SDC:       $SDC_FILE (period=${CLOCK_PERIOD}ns)"
echo "  Liberty:   $LIBERTY"
echo "  Results:   $RESULTS"
echo "  Reports:   $REPORTS"
echo "──────────────────────────────────────"
